<!--
  공통 <head> 메타 블록 (단일 출처).

  ⚠️ 참고: <script src> 는 fetch 로 주입하면 실행되지 않으므로,
  이 블록은 자동 주입이 아니라 "각 페이지의 <head> 에 복사해 넣는 기준 템플릿"입니다.
  새 페이지를 만들 때 아래 내용을 그대로 복사하고, 표시된 부분만 페이지별로 바꾸세요.

  바꿀 곳:
    - <title>            ← 페이지 제목 · 지성민의 포털
    - meta description    ← 페이지 설명
    - og:title / og:description / og:url / canonical
    - (작품·노트는) og:image 를 해당 콘텐츠 대표 이미지로
-->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>지성민의 포털</title>
<meta name="description" content="지성민의 작품, 노트, 링크 모음" />

<!-- OpenGraph / Twitter 기본값 -->
<meta property="og:type" content="website" />
<meta property="og:title" content="지성민의 포털" />
<meta property="og:description" content="지성민의 작품, 노트, 링크 모음" />
<meta property="og:image" content="https://ta0110.github.io/assets/images/og-default.png" />
<meta property="og:url" content="https://ta0110.github.io/" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="canonical" href="https://ta0110.github.io/" />

<!-- Tailwind Play CDN (빌드 도구 없이 사용) -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- 톤(색상/폰트/간격)은 theme.css 의 CSS 변수에서만 제어 -->
<link rel="stylesheet" href="/assets/css/theme.css" />
<link rel="stylesheet" href="/assets/css/base.css" />

<!-- 초기 테마 적용(깜빡임 방지) + 토글 -->
<script src="/assets/js/theme-toggle.js"></script>
<!-- 공통 헤더/푸터 주입 -->
<script defer src="/assets/js/include.js"></script>
