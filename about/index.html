<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>소개 · 지성민의 포털</title>
  <meta name="description" content="지성민 소개" />

  <meta property="og:type" content="profile" />
  <meta property="og:title" content="소개 · 지성민의 포털" />
  <meta property="og:description" content="지성민 소개" />
  <meta property="og:image" content="https://ta0110.github.io/my-portal/assets/images/og-default.png" />
  <meta property="og:url" content="https://ta0110.github.io/my-portal/about/" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="canonical" href="https://ta0110.github.io/my-portal/about/" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/theme.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <script src="/assets/js/theme-toggle.js"></script>
  <script defer src="/assets/js/include.js"></script>
</head>
<body>
  <div data-include="/partials/header.html"></div>

  <main class="container">
    <article class="prose">
      <div class="center" style="margin-bottom:32px">
        <img id="about-avatar" class="avatar" src="/assets/images/avatar.png" alt="지성민" onerror="this.style.visibility='hidden'" />
        <h1 id="about-name" style="margin-top:16px">지성민</h1>
        <p class="tagline" id="about-tagline">데이터로 인사이트를 만듭니다</p>
      </div>

      <div id="about-bio" style="white-space:pre-line"></div>

      <h2>연락처 · 링크</h2>
      <p id="about-location" class="muted"></p>
      <div class="social-row" id="about-socials" style="justify-content:flex-start;margin-top:12px"></div>
    </article>
  </main>

  <div data-include="/partials/footer.html"></div>

  <script>
    (function () {
      var ICONS = {
        github: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.2.8-.5v-2c-3.2.7-3.9-1.4-3.9-1.4-.5-1.3-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.4-2.3 1.2-3.1-.1-.3-.5-1.5.1-3 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17.3 4.7 18.3 5 18.3 5c.6 1.5.2 2.7.1 3 .8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.6.8.5 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>',
        linkedin: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.4 20.4h-3.6v-5.6c0-1.3 0-3-1.9-3s-2.1 1.4-2.1 2.9v5.7H9.3V9h3.4v1.6h.1c.5-.9 1.6-1.9 3.4-1.9 3.6 0 4.3 2.4 4.3 5.5v6.2zM5.3 7.4a2.1 2.1 0 1 1 0-4.2 2.1 2.1 0 0 1 0 4.2zM7.1 20.4H3.5V9h3.6v11.4zM22.2 0H1.8C.8 0 0 .8 0 1.7v20.6c0 .9.8 1.7 1.8 1.7h20.4c1 0 1.8-.8 1.8-1.7V1.7c0-.9-.8-1.7-1.8-1.7z"/></svg>',
        mail: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>'
      };
      function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
      fetch('/data/profile.json').then(function(r){return r.json();}).then(function(p){
        document.getElementById('about-name').textContent = p.name || '';
        document.getElementById('about-tagline').textContent = p.tagline || '';
        if (p.avatar) document.getElementById('about-avatar').src = p.avatar;
        document.getElementById('about-bio').textContent = p.bio || '';
        document.getElementById('about-location').textContent = (p.location ? '📍 ' + p.location + '   ' : '') + (p.email ? '✉ ' + p.email : '');
        document.getElementById('about-socials').innerHTML = (p.socials || []).map(function(s){
          var ext = s.url && s.url.indexOf('mailto:') !== 0 ? ' target="_blank" rel="noopener"' : '';
          return '<a href="'+esc(s.url)+'"'+ext+'>'+(ICONS[s.icon]||'')+' '+esc(s.label)+'</a>';
        }).join('');
      }).catch(function(e){console.error('[profile]', e);});
    })();
  </script>
</body>
</html>
